<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PrintStream</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      background: #111827;
      color: #f9fafb;
    }
    .card {
      background: #1f2937;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      margin-right: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    .start { background: #22c55e; }
    .stop { background: #ef4444; color: #fff; }
    pre {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #0b1220;
      padding: 12px;
      border-radius: 8px;
    }
    .meta { color: #9ca3af; margin-bottom: 12px; }
    .error {
      display: none;
      background: #450a0a;
      border: 1px solid #ef4444;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }
    .error.visible { display: block; }
    .error h3 { margin-top: 0; color: #fecaca; }
    .ok { color: #86efac; }
    .bad { color: #fca5a5; }
  </style>
</head>
<body>
  <h1>PrintStream</h1>
  <div class="card">
    <h2>Livestream</h2>
    <p class="meta" id="summary">Status wird geladen …</p>
    <button class="start" onclick="act('start')">Stream starten</button>
    <button class="stop" onclick="act('stop')">Stream stoppen</button>
    <div class="error" id="errorBox">
      <h3>FFmpeg-Fehler</h3>
      <p id="errorMsg"></p>
      <pre id="logTail"></pre>
    </div>
    <h3>Rohstatus</h3>
    <pre id="stream">Status wird geladen …</pre>
  </div>
  <div class="card">
    <h2>OctoPrint</h2>
    <button onclick="loadOcto()">Status aktualisieren</button>
    <pre id="octo">Noch nicht geladen.</pre>
  </div>
  <script>
    async function req(u, o = {}) {
      const r = await fetch(u, o);
      const d = await r.json();
      if (!r.ok) throw new Error(JSON.stringify(d));
      return d;
    }

    function renderStream(data) {
      const running = !!data.running;
      const summary = document.getElementById('summary');
      summary.innerHTML = running
        ? `<span class="ok">Stream läuft</span> (PID ${data.pid ?? '—'})`
        : `<span class="bad">Stream gestoppt</span>` +
          (data.return_code != null ? ` · Exit ${data.return_code}` : '');

      const errorBox = document.getElementById('errorBox');
      const hasError = !running && (data.last_error || (data.log_tail && data.log_tail.length));
      if (hasError) {
        errorBox.classList.add('visible');
        document.getElementById('errorMsg').textContent = data.last_error || 'Siehe FFmpeg-Log unten.';
        document.getElementById('logTail').textContent =
          (data.log_tail && data.log_tail.length)
            ? data.log_tail.join('\n')
            : '(kein Log)';
      } else {
        errorBox.classList.remove('visible');
        document.getElementById('errorMsg').textContent = '';
        document.getElementById('logTail').textContent = '';
      }

      const safe = {
        running: data.running,
        pid: data.pid,
        return_code: data.return_code,
        last_error: data.last_error,
        log_tail_lines: (data.log_tail || []).length,
      };
      document.getElementById('stream').textContent = JSON.stringify(safe, null, 2);
    }

    async function load() {
      try {
        renderStream(await req('/api/stream/status'));
      } catch (e) {
        document.getElementById('summary').textContent = e.message;
        document.getElementById('stream').textContent = e.message;
      }
    }

    async function act(a) {
      try {
        renderStream(await req('/api/stream/' + a, { method: 'POST' }));
      } catch (e) {
        document.getElementById('summary').textContent = e.message;
        document.getElementById('stream').textContent = e.message;
        const errorBox = document.getElementById('errorBox');
        errorBox.classList.add('visible');
        document.getElementById('errorMsg').textContent = e.message;
      }
    }

    async function loadOcto() {
      try {
        document.getElementById('octo').textContent =
          JSON.stringify(await req('/api/octoprint/status'), null, 2);
      } catch (e) {
        document.getElementById('octo').textContent = e.message;
      }
    }

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
