<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PrintStream</title><style>body{font-family:system-ui;max-width:900px;margin:40px auto;padding:0 20px;background:#111827;color:#f9fafb}.card{background:#1f2937;border-radius:16px;padding:24px;margin-bottom:20px}button{border:0;border-radius:10px;padding:12px 18px;margin-right:10px;cursor:pointer}.start{background:#22c55e}.stop{background:#ef4444;color:white}pre{white-space:pre-wrap}</style></head><body><h1>PrintStream</h1><div class="card"><h2>Livestream</h2><button class="start" onclick="action('start')">Start</button><button class="stop" onclick="action('stop')">Stop</button><pre id="stream">Lade…</pre></div><div class="card"><h2>OctoPrint</h2><button onclick="octo()">Aktualisieren</button><pre id="octo">Noch nicht geladen.</pre></div><script>async function req(u,o={}){const r=await fetch(u,o),d=await r.json();if(!r.ok)throw new Error(JSON.stringify(d));return d}async function status(){try{stream.textContent=JSON.stringify(await req('/api/v1/stream/status'),null,2)}catch(e){stream.textContent=e.message}}async function action(a){try{stream.textContent=JSON.stringify(await req('/api/v1/stream/'+a,{method:'POST'}),null,2)}catch(e){stream.textContent=e.message}}async function octo(){try{document.getElementById('octo').textContent=JSON.stringify(await req('/api/v1/octoprint/status'),null,2)}catch(e){document.getElementById('octo').textContent=e.message}}status();setInterval(status,5000)</script></body></html>
